<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شاهين إكسبريس | النسخة المستقرة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --bg-purple: #1a051a; --glass: rgba(30, 10, 30, 0.95); --text: #fff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg-purple); color: var(--text); font-family: -apple-system, sans-serif; overflow: hidden; }

        /* الظل المائي الملكي الواضح */
        .royal-bg-shadow { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px; height: 320px; background: url('https://i.postimg.cc/3RmMjYNd/Whats-App-Image-2026-04-10-at-6-22-30-PM.jpg') no-repeat center/contain; opacity: 0.1; pointer-events: none; z-index: 0; }
        
        /* إشعارات أبل الداخلية */
        #apple-notify { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: rgba(0,0,0,0.9); border: 1px solid var(--gold); color: var(--gold); padding: 15px; border-radius: 20px; z-index: 10000; text-align: center; font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        #apple-notify.show { top: 20px; }

        /* شاشة انطلاق الصقر (🦅☁️) */
        #eagle-takeoff { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-purple); z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column; overflow: hidden; }
        .cloud { position: absolute; color: rgba(255,255,255,0.08); animation: moveClouds 10s linear infinite; }
        @keyframes moveClouds { from { transform: translateX(100vw); } to { transform: translateX(-100vw); } }
        .eagle-animate { color: var(--gold); font-size: 80px; animation: eagleFly 2.5s ease-in-out forwards; position: relative; z-index: 10; }
        @keyframes eagleFly { 0% { transform: scale(0.5) translateY(50px); opacity: 0; } 50% { transform: scale(1) translateY(0); opacity: 1; } 100% { transform: scale(1.5) translateY(-100vh); opacity: 0; } }

        .app-shell { width: 100%; max-width: 500px; height: 100%; margin: auto; position: relative; display: flex; flex-direction: column; border-left: 1px solid rgba(212,175,55,0.1); border-right: 1px solid rgba(212,175,55,0.1); }

        /* الهيدر والبحث */
        .apple-header { padding: 45px 25px 15px; text-align: right; }
        .apple-header h1 { font-size: 34px; color: var(--gold); margin: 0; font-weight: 800; }
        .search-container { padding: 0 25px 20px; }
        .apple-search { background: rgba(255,255,255,0.06); border-radius: 16px; padding: 14px; display: flex; align-items: center; gap: 10px; border: 1px solid rgba(212,175,55,0.25); }
        .apple-search input { background: none; border: none; color: #fff; width: 100%; outline: none; font-size: 16px; }
        
        .categories { display: flex; gap: 12px; padding: 0 25px 25px; overflow-x: auto; scrollbar-width: none; }
        .cat-pill { padding: 10px 20px; background: rgba(255,255,255,0.03); border: 1px solid rgba(212,175,55,0.15); border-radius: 25px; font-size: 14px; color: var(--gold); white-space: nowrap; cursor: pointer; }
        .cat-pill.active { background: var(--gold); color: #000; font-weight: bold; border-color: var(--gold); }

        .page { display: none; padding: 0 25px 25px; flex-direction: column; flex-grow: 1; overflow-y: auto; z-index: 20; }
        .page.active { display: flex; animation: appleFade 0.5s ease; }
        @keyframes appleFade { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; } }

        /* الكروت */
        .card { background: var(--glass); border-radius: 25px; padding: 18px; margin-bottom: 15px; display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.03); }
        .card img { width: 65px; height: 65px; border-radius: 16px; object-fit: cover; margin-left: 18px; border: 1px solid var(--gold); }
        .btn-gold { background: var(--gold); color: #000; border: none; padding: 18px; border-radius: 18px; font-weight: bold; width: 100%; cursor: pointer; }

        /* شريط التنقل */
        .tab-bar { height: 90px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(212,175,55,0.1); }
        .tab-item { color: #555; text-align: center; cursor: pointer; position: relative; }
        .tab-item.active { color: var(--gold); }
        .badge { position: absolute; top: -6px; right: -6px; background: #e74c3c; color: #fff; font-size: 10px; padding: 3px 7px; border-radius: 50%; font-weight: bold; }
    </style>
</head>
<body>

<div class="royal-bg-shadow"></div>
<div id="apple-notify"><i class="fas fa-bell"></i> <span id="notify-msg"></span></div>

<div id="eagle-takeoff">
    <i class="fas fa-cloud cloud" style="top:20%; left:10%; font-size:40px;"></i>
    <i class="fas fa-cloud cloud" style="top:50%; left:60%; font-size:60px;"></i>
    <div class="eagle-animate"><i class="fas fa-dove"></i></div>
    <h2 style="color:var(--gold); margin-top:25px;">صقور شاهين انطلقت.. 🦅</h2>
</div>

<div class="app-shell">
    
    <div id="p-login" class="page active" style="justify-content:center; text-align:center;">
        <div style="background:rgba(255,255,255,0.03); border:1px dashed var(--gold); border-radius:25px; padding:20px; margin-bottom:25px;">
            <i class="fas fa-cloud fa-2x" style="color:var(--gold)"></i> 🦅
            <p style="color:var(--gold); font-size:14px; margin-top:10px;">يرجى التأكد من رقم الجوال بدقة لضمان تواصل الصقور معك</p>
        </div>
        <img src="https://i.postimg.cc/3RmMjYNd/Whats-App-Image-2026-04-10-at-6-22-30-PM.jpg" width="120" style="border-radius:30px; margin-bottom:20px; border:2px solid var(--gold);">
        <input type="text" id="uName" style="width:100%; padding:20px; background:#1a1a1a; border:1px solid #333; border-radius:18px; color:#fff; text-align:center; margin-bottom:15px; outline:none;" placeholder="الاسم الكامل">
        <input type="tel" id="uPhone" style="width:100%; padding:20px; background:#1a1a1a; border:1px solid #333; border-radius:18px; color:#fff; text-align:center; margin-bottom:15px; outline:none;" placeholder="رقم الجوال (09xxxxxxxx)">
        <button class="btn-gold" onclick="login()">دخول سريع</button>
    </div>

    <div id="apple-ui" style="display:none">
        <div class="apple-header"><h1>اكتشف</h1></div>
        <div class="search-container"><div class="apple-search"><i class="fas fa-search" style="color:#555"></i><input type="text" id="g-search" placeholder="بحث..." onkeyup="renderPlaces()"></div></div>
        <div class="categories">
            <div class="cat-pill active" onclick="setCat('الكل', this)">الكل</div>
            <div class="cat-pill" onclick="setCat('مطعم', this)">مطاعم</div>
            <div class="cat-pill" onclick="setCat('صيدلية', this)">صيدليات</div>
        </div>
    </div>

    <div id="p-home" class="page"><div id="res-list"></div></div>
    
    <div id="p-menu" class="page">
        <div style="display:flex; align-items:center; gap:12px; margin: 25px 0;"><i class="fas fa-chevron-right" onclick="nav('p-home')" style="color:var(--gold); font-size:26px; cursor:pointer;"></i><h2 id="menu-title" style="margin:0;"></h2></div>
        <div id="items-list"></div>
    </div>

    <div id="p-cart" class="page">
        <div style="padding:40px 0 20px;"><h1>السلة</h1></div>
        <div id="cart-items"></div>
        <div id="cart-summary"></div>
    </div>

    <div id="p-history" class="page">
        <div style="padding:40px 0 20px;"><h1>طلباتي 🦅</h1></div>
        <div id="history-content"></div>
    </div>

    <div id="tab-bar" class="tab-bar" style="display:none">
        <div class="tab-item active" onclick="nav('p-home')"><i class="fas fa-compass"></i><span>اكتشف</span></div>
        <div class="tab-item" onclick="nav('p-cart')"><i class="fas fa-shopping-basket"></i><span id="badge" class="badge" style="display:none">0</span><span>السلة</span></div>
        <div class="tab-item" onclick="nav('p-history')"><i class="fas fa-receipt"></i><span>طلباتي</span></div>
    </div>
</div>

<script>
    let user = null, cart = [], currentResId = null, currentCat = 'الكل';
    const deviceId = localStorage.getItem('sh_device_id') || 'DEV-' + Date.now();
    localStorage.setItem('sh_device_id', deviceId);

    function notify(msg) {
        document.getElementById('notify-msg').innerText = msg;
        const n = document.getElementById('apple-notify');
        n.classList.add('show');
        setTimeout(() => n.classList.remove('show'), 3000);
    }

    function login() {
        const n = document.getElementById('uName').value, p = document.getElementById('uPhone').value;
        if(n && /^09\d{8}$/.test(p)) {
            localStorage.setItem('sh_active_user', JSON.stringify({name:n, phone:p}));
            location.reload();
        } else { notify("⚠️ تأكد من الرقم (09xxxxxxxx)"); }
    }

    window.onload = () => {
        if(localStorage.getItem('sh_active_user')) {
            document.getElementById('p-login').classList.remove('active');
            document.getElementById('apple-ui').style.display = 'block';
            document.getElementById('tab-bar').style.display = 'flex';
            nav('p-home');
        }
    };

    function nav(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('apple-ui').style.display = (id === 'p-home') ? 'block' : 'none';
        document.querySelectorAll('.tab-item').forEach((t,i) => {
            t.classList.remove('active');
            if((id==='p-home'&&i===0)||(id==='p-cart'&&i===1)||(id==='p-history'&&i===2)) t.classList.add('active');
        });
        if(id==='p-home') renderPlaces();
        if(id==='p-cart') renderCart();
        if(id==='p-history') renderHistory();
    }

    function renderPlaces() {
        const all = JSON.parse(localStorage.getItem('sh_restaurants')) || [];
        const filtered = all.filter(r => (currentCat==='الكل' || r.category===currentCat) && r.name.includes(document.getElementById('g-search').value));
        document.getElementById('res-list').innerHTML = filtered.map(r => `
            <div class="card" onclick="openMenu('${r.id}')">
                <img src="${r.image}">
                <div style="flex:1;"><b>${r.name}</b><br><small style="color:var(--gold)">جاهز للتوصيل</small></div>
            </div>
        `).join('');
    }

    function openMenu(id) {
        const res = JSON.parse(localStorage.getItem('sh_restaurants')).find(r => r.id == id);
        document.getElementById('menu-title').innerText = res.name;
        document.getElementById('items-list').innerHTML = res.menu.map(m => `
            <div class="card">
                <div style="flex:1;"><b>${m.itemName}</b><br><small>${m.price} ل.س</small></div>
                <button class="btn-gold" style="width:auto; padding:8px 15px;" onclick="addToCart('${res.id}','${res.name}','${m.itemName}',${m.price})">أضف</button>
            </div>
        `).join('');
        nav('p-menu');
    }

    function addToCart(rid, rn, name, price) {
        if(currentResId && currentResId !== rid) { cart = []; notify("تم تغيير المطعم"); }
        currentResId = rid;
        const ex = cart.find(i => i.name === name);
        if(ex) ex.qty++; else cart.push({resName:rn, name, price, qty:1});
        updateBadge(); notify("تمت الإضافة ✅");
    }

    function updateBadge() {
        const total = cart.reduce((s,i) => s + i.qty, 0);
        document.getElementById('badge').innerText = total;
        document.getElementById('badge').style.display = total > 0 ? 'block' : 'none';
    }

    function renderCart() {
        const container = document.getElementById('cart-items');
        if(cart.length === 0) { container.innerHTML = "<p style='text-align:center; color:#555;'>السلة فارغة</p>"; document.getElementById('cart-summary').innerHTML = ""; return; }
        container.innerHTML = cart.map((i,idx) => `
            <div class="card">
                <div style="flex:1;"><b>${i.name}</b><br><small>${i.price * i.qty} ل.س</small></div>
                <div style="display:flex; align-items:center; gap:12px; background:#222; padding:5px 12px; border-radius:10px;">
                    <i class="fas fa-minus" onclick="changeQty(${idx},-1)"></i><b>${i.qty}</b><i class="fas fa-plus" onclick="changeQty(${idx},1)"></i>
                </div>
            </div>
        `).join('');
        const sub = cart.reduce((s,i) => s + (i.price*i.qty), 0);
        document.getElementById('cart-summary').innerHTML = `
            <div class="bill-card">
                <div style="display:flex; justify-content:space-between"><span>الوجبات:</span><span>${sub} ل.س</span></div>
                <div style="display:flex; justify-content:space-between; margin-top:10px"><span>التوصيل:</span><span>10,000 ل.س</span></div>
                <hr style="opacity:0.1">
                <div style="display:flex; justify-content:space-between; color:var(--gold); font-weight:bold"><span>الإجمالي:</span><span>${sub+10000} ل.س</span></div>
            </div>
            <button class="btn-gold" style="margin-top:20px" onclick="checkout()">تأكيد الطلب 🦅</button>
        `;
    }

    function changeQty(idx, d) {
        cart[idx].qty += d; if(cart[idx].qty <= 0) cart.splice(idx,1);
        if(cart.length === 0) currentResId = null;
        updateBadge(); renderCart();
    }

    function checkout() {
        document.getElementById('eagle-takeoff').style.display = 'flex';
        const sub = cart.reduce((s,i) => s + (i.price*i.qty), 0);
        const order = { id: Date.now(), deviceId: deviceId, res: cart[0].resName, items: cart.map(i=>`${i.qty}x ${i.name}`).join(','), total: sub+10000, status: 'قيد التنفيذ 🦅' };
        
        // حفظ في سجل العميل (الخصوصية)
        let myHistory = JSON.parse(localStorage.getItem('sh_my_orders')) || [];
        myHistory.unshift(order);
        localStorage.setItem('sh_my_orders', JSON.stringify(myHistory));

        // إرسال للساحة العامة (للمناديب)
        let publicPool = JSON.parse(localStorage.getItem('sh_public_orders')) || [];
        publicPool.push({...order, customer: JSON.parse(localStorage.getItem('sh_active_user')).name, phone: JSON.parse(localStorage.getItem('sh_active_user')).phone });
        localStorage.setItem('sh_public_orders', JSON.stringify(publicPool));

        cart = []; currentResId = null; updateBadge();
        setTimeout(() => { document.getElementById('eagle-takeoff').style.display = 'none'; nav('p-history'); }, 2500);
    }

    function renderHistory() {
        const all = JSON.parse(localStorage.getItem('sh_my_orders')) || [];
        document.getElementById('history-content').innerHTML = all.map(o => `
            <div class="card" style="border-right:4px solid var(--gold)">
                <div style="flex:1;"><b>${o.res}</b><br><small>${o.items}</small></div>
                <div style="text-align:left;"><b style="color:var(--gold)">${o.status}</b><br><small>${o.total} ل.س</small></div>
            </div>
        `).join('');
    }

    function setCat(c, el) { currentCat = c; document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active')); el.classList.add('active'); renderPlaces(); }
</script>
</body>
</html>
