<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بوابة صيدلية شاهين | استقبال الاستشارات 🏥</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #d4af37; --p-dark: #0a010a; --p-main: #1d051d; --glass: rgba(255, 255, 255, 0.05); --success: #27ae60; --danger: #e74c3c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: radial-gradient(circle, var(--p-main), var(--p-dark)); color: #fff; font-family: sans-serif; overflow-x: hidden; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        #app-container { transition: 0.5s; position: relative; overflow: hidden; background: radial-gradient(circle, var(--p-main), var(--p-dark)); width: 100vw; height: 100vh; }
        .mode-mobile { width: 375px; height: 812px; border: 8px solid #333; border-radius: 40px; margin: auto; }
        
        .auth-overlay { position: fixed; inset: 0; background: var(--p-dark); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--glass); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; border: 1px solid var(--gold); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; text-align: center; outline: none; }
        .btn-login { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        header { padding: 15px 20px; background: var(--glass); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .res-name { font-weight: bold; color: var(--gold); }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .stat-card { background: var(--glass); padding: 12px; border-radius: 12px; border-right: 3px solid var(--gold); }
        .stat-card span { display: block; font-size: 11px; opacity: 0.6; }
        
        #orders-list { padding: 15px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 100px; }
        .order-card { background: var(--glass); border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .order-id { font-size: 11px; opacity: 0.5; }
        .client-info { margin: 10px 0; font-weight: bold; font-size: 16px; }
        
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-act { padding: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-accept { background: var(--success); color: #fff; }
        .btn-reject { background: var(--danger); color: #fff; }
        
        #active-chat-box { display: none; position: fixed; inset: 0; background: var(--p-dark); z-index: 2000; flex-direction: column; }
        .chat-header { padding: 15px; background: var(--glass); display: flex; justify-content: space-between; align-items: center; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; }
        .msg.pharmacy { background: var(--gold); color: #000; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.client { background: #333; color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; }
        .chat-input-area { padding: 15px; background: var(--glass); display: flex; gap: 10px; }
        
        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: bold; display: none; z-index: 9999; }
        .sync-loader { position: fixed; top: 0; left: 0; height: 3px; background: var(--gold); z-index: 9999; transition: width 0.1s linear; }
    </style>
</head>
<body onclick="initAudio()">

    <div id="app-container">
        <div class="sync-loader" id="sync-bar"></div>
        <div id="toast"></div>

        <div id="auth-screen" class="auth-overlay">
            <div class="auth-card">
                <img src="https://i.postimg.cc/QxzPkmPf/Whats-App-Image-2026-04-10-at-6-22-30-PM-t7edrz.jpg" width="80" style="border-radius: 20px; border: 1px solid var(--gold); margin-bottom: 15px;">
                <h2 style="color:var(--gold); margin:0 0 5px 0;">بوابة الصيدليات</h2>
                <input type="email" id="login-email" placeholder="البريد الإلكتروني للصيدلية">
                <input type="password" id="login-code" placeholder="كود تفعيل المناوبة">
                <button class="btn-login" onclick="checkAuth()">دخول المناوبة الآن</button>
            </div>
        </div>

        <div id="main-content" style="display:none">
            <header>
                <div class="res-name" id="display-res-name">اسم الصيدلية</div>
                <button onclick="logout()" style="background:none; border:none; color:var(--danger); font-size:18px;"><i class="fas fa-power-off"></i></button>
            </header>

            <div class="stats-grid">
                <div class="stat-card">
                    <span>استشارات معلقة</span>
                    <div id="stat-count" style="font-size: 20px; font-weight: bold;">0</div>
                </div>
                <div class="stat-card">
                    <span>حالة النظام</span>
                    <div id="system-status" style="color:var(--success); font-size:12px; margin-top:5px;">متصل الآن ✅</div>
                </div>
            </div>

            <div id="orders-list"></div>
        </div>

        <div id="active-chat-box">
            <div class="chat-header">
                <div>
                    <div id="client-name-chat" style="font-weight:bold;">...</div>
                    <div id="active-order-id" style="font-size:10px; opacity:0.6;">...</div>
                </div>
                <button onclick="closeChat()" style="background:none; border:none; color:#fff; font-size:20px;"><i class="fas fa-times"></i></button>
            </div>
            <div class="chat-messages" id="chat-flow"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="اكتب ردك الطبي هنا..." style="margin:0;">
                <button class="btn-login" style="width:60px;" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
            </div>
            <div style="padding:15px;">
                <button class="btn-login" style="background:var(--success); color:#fff;" onclick="finishConsultation()">إنهاء الاستشارة وتوجيه للمندوب 🦅</button>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://ricoslplbhphydhtrufe.supabase.co', 'sb_publishable_k6LgEuwPLdCsBMCFC12wfQ_BSOJotuw');
        let currentRes = null;
        let lastCount = 0;
        let refreshTimer = 0;
        let activeOrderId = null;
        const sound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        function initAudio() { sound.play().then(() => { sound.pause(); sound.currentTime = 0; }).catch(() => {}); }

        async function checkAuth() {
            const email = document.getElementById('login-email').value;
            const code = document.getElementById('login-code').value;
            if(!email || !code) return;

            const { data, error } = await _supabase.from('pharmacies').select('*').eq('email', email).eq('access_code', code).single();
            
            if(data) {
                currentRes = data;
                localStorage.setItem('sh_session', JSON.stringify(data));
                startApp();
            } else { alert("بيانات الدخول غير صحيحة"); }
        }

        function startApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('display-res-name').innerText = currentRes?.name;
            
            // تفعيل نظام البث المباشر المتقدم لمراقبة الجدول بالكامل
            _supabase.channel('pharmacy_realtime')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'sh_public_orders' }, payload => {
                    // مراقبة ذكية: قارن المعرف كنص أو رقم
                    const pid = payload.new ? payload.new.pharmacy_id : null;
                    if (String(pid) === String(currentRes.id)) {
                        loadOrders();
                    }
                })
                .subscribe();

            loadOrders(true);
            
            // تحديث تلقائي كل 5 ثوانٍ كخط دفاع ثانٍ
            setInterval(() => {
                refreshTimer += 10;
                document.getElementById('sync-bar').style.width = refreshTimer + "%";
                if(refreshTimer >= 100) { refreshTimer = 0; loadOrders(); }
            }, 500);
        }

        async function loadOrders(isFirst = false) {
            if(!currentRes) return;

            // استعلام مرن جداً يبحث عن الـ ID كنص لضمان المطابقة مع كود العميل
            const { data: orders, error } = await _supabase.from('sh_public_orders')
                .select('*')
                .eq('pharmacy_id', String(currentRes.id))
                .in('status', ['searching', 'consulting'])
                .order('created_at', { ascending: false });

            if (error) {
                document.getElementById('system-status').innerText = "فشل المزامنة ⚠️";
                document.getElementById('system-status').style.color = "var(--danger)";
                return;
            } else {
                document.getElementById('system-status').innerText = "متصل الآن ✅";
                document.getElementById('system-status').style.color = "var(--success)";
            }

            const activeOrders = orders || [];
            
            if(!isFirst && activeOrders.length > lastCount) {
                sound.play().catch(()=>{});
                showToast("وصل طلب استشارة جديد! 🏥");
            }
            
            lastCount = activeOrders.length;
            document.getElementById('stat-count').innerText = activeOrders.length;
            renderOrders(activeOrders);
        }

        function renderOrders(orders) {
            const list = document.getElementById('orders-list');
            if(orders.length === 0) {
                list.innerHTML = `<div style="text-align:center; opacity:0.3; margin-top:50px;"><i class="fas fa-clock fa-3x"></i><p>بانتظار استشارات جديدة...</p></div>`;
                return;
            }

            list.innerHTML = orders.map(o => `
                <div class="order-card" style="${o.status === 'consulting' ? 'border: 2px solid var(--success)' : 'border: 1px solid var(--gold)'}">
                    <div style="display:flex; justify-content:space-between;">
                        <span class="order-id">#${o.id}</span>
                        <span style="font-size:10px; opacity:0.6;">${new Date(o.created_at).toLocaleTimeString('ar-SY')}</span>
                    </div>
                    <div class="client-info">${o.customer_name}</div>
                    <div style="font-size:12px; margin-bottom:10px; opacity:0.8;">📍 العنوان: ${o.customer_address}</div>
                    <div class="action-btns">
                        ${o.status === 'consulting' ? 
                            `<button class="btn-act btn-accept" style="grid-column: span 2" onclick="openChat(${o.id})">متابعة الدردشة <i class="fas fa-comments"></i></button>` :
                            `<button class="btn-act btn-accept" onclick="openChat(${o.id})">فتح الدردشة</button>
                             <button class="btn-act btn-reject" onclick="rejectOrder(${o.id})">اعتذار</button>`
                        }
                    </div>
                </div>
            `).join('');
        }

        async function openChat(orderId) {
            activeOrderId = orderId;
            // إبلاغ العميل فوراً بأن الصيدلي دخل الدردشة
            await _supabase.from('sh_public_orders').update({ status: 'consulting' }).eq('id', orderId);
            
            const { data: order } = await _supabase.from('sh_public_orders').select('*').eq('id', orderId).single();
            
            document.getElementById('client-name-chat').innerText = order.customer_name;
            document.getElementById('active-order-id').innerText = "استشارة رقم #" + orderId;
            document.getElementById('active-chat-box').style.display = 'flex';
            document.getElementById('chat-flow').innerHTML = `<div class="msg client">مرحباً، أود استشارتك بخصوص طلب طبي..</div>`;
            loadOrders();
        }

        async function finishConsultation() {
            if(confirm("هل تم الاتفاق؟ سيتم الآن تحويل الطلب لمناديب التوصيل.")) {
                const { error } = await _supabase.from('sh_public_orders').update({
                    status: 'searching',
                    res_type: 'restaurant', // تحويله لنوع يفهمه المندوب
                    restaurant_note: 'طلب صيدلية مؤكد - يرجى الاستلام فوراً'
                }).eq('id', activeOrderId);
                
                if(!error) {
                    closeChat();
                    showToast("تم إرسال الطلب للمناديب 🦅");
                }
            }
        }

        async function rejectOrder(orderId) {
            if(confirm("هل تريد الاعتذار عن هذا الطلب؟")) {
                await _supabase.from('sh_public_orders').update({ status: 'cancelled' }).eq('id', orderId);
                loadOrders();
            }
        }

        function sendMsg() {
            const inp = document.getElementById('chat-input');
            if(!inp.value) return;
            const flow = document.getElementById('chat-flow');
            const d = document.createElement('div');
            d.className = "msg pharmacy";
            d.innerText = inp.value;
            flow.appendChild(d);
            inp.value = "";
            flow.scrollTop = flow.scrollHeight;
        }

        function closeChat() { document.getElementById('active-chat-box').style.display = 'none'; activeOrderId = null; loadOrders(); }
        function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display='block'; setTimeout(()=>t.style.display='none',3000); }
        function logout() { localStorage.removeItem('sh_session'); location.reload(); }
        window.onload = () => { const s = localStorage.getItem('sh_session'); if(s) { currentRes = JSON.parse(s); startApp(); } };
    </script>
</body>
</html>
